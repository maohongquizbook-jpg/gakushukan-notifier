name: gakushukan-monitor

on:
  schedule:
    # 15分おき。JST 7:00〜22:45 のみ実行（cronはUTC指定: JST-9時間）
    - cron: "*/15 22,23 * * *"
    - cron: "*/15 0-13 * * *"
  workflow_dispatch:   # Actionsタブから手動実行できるようにする

permissions:
  contents: write      # state.json をコミットして前回状態を持ち越すため

concurrency:
  group: monitor       # 前の実行が長引いた場合に重複起動しない
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install browser
        run: playwright install --with-deps chromium

      - name: Inject webhook URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import yaml, os
          cfg = yaml.safe_load(open("config.yaml", encoding="utf-8"))
          cfg["discord_webhook_url"] = os.environ["DISCORD_WEBHOOK_URL"]
          yaml.safe_dump(cfg, open("config.yaml", "w", encoding="utf-8"), allow_unicode=True)
          PYEOF

      - name: Run monitor
        run: python monitor.py

      - name: Persist state
        run: |
          git config user.name "monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "update state [skip ci]" || echo "no changes"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
