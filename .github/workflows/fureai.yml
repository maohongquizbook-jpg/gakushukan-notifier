name: fureai-survey

on:
  workflow_dispatch:   # 手動実行のみ（フェーズ1: 画面構造の調査）

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - name: Run survey
        run: python fureai.py --debug
      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fureai-debug-files
          path: debug/
          if-no-files-found: ignore
