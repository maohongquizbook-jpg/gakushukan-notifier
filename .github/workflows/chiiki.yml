name: chiiki-monitor

on:
  schedule:
    # 30分おき JST 7:00〜22:30
    - cron: "*/30 22,23 * * *"
    - cron: "*/30 0-13 * * *"
  workflow_dispatch:
    inputs:
      test:
        description: "テスト通知をDiscordへ送る"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: chiiki
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium
      - name: Install browser
        run: playwright install --with-deps chromium
      - name: Inject webhook URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_CHIIKI }}
        run: |
          python - <<'PYEOF'
          import yaml, os
          cfg = yaml.safe_load(open("config_chiiki.yaml", encoding="utf-8"))
          cfg["discord_webhook_url"] = os.environ["DISCORD_WEBHOOK_URL"]
          yaml.safe_dump(cfg, open("config_chiiki.yaml", "w", encoding="utf-8"), allow_unicode=True)
          PYEOF
      - name: Run monitor
        run: |
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            python monitor.py --config config_chiiki.yaml --test
          else
            python monitor.py --config config_chiiki.yaml
          fi
      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chiiki-debug-files
          path: debug/
          if-no-files-found: ignore
      - name: Persist state
        run: |
          if [ -f state_chiiki.json ]; then
            git config user.name "monitor-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state_chiiki.json
            git commit -m "update chiiki state [skip ci]" || echo "no changes"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push
          fi
