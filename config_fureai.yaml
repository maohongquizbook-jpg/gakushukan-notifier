# ===== 川崎市 ふれあいネット 会議室監視設定 =====
# Webhook（GitHub ActionsではSecretsのDISCORD_WEBHOOK_FUREAIから注入）
discord_webhook_url: ""

state_file: "state_fureai.json"
notify_label: "午後＋夜間"

# 市民館系の時間区分（午後13:00-17:00 / 夜間17:30-21:00前後）
slot_windows:
  午前: [900, 1200]
  午後: [1300, 1700]
  夜間: [1730, 2130]

required_slots:
  - 午後
  - 夜間

# 監視対象（川崎区・幸区・中原区 / 定員11名以上 / 午後+夜間の土日祝料金 5,000円以内）
# fee = 午後+夜間の合計（平日料金×1.2の土日祝料金）。
# 幸市民館・日吉分館・プラザ大師/田島は市民館共通単価からの推定額（※要確認）
# 監視対象: 川崎区・幸区・中原区 / 定員11名以上 / 土日祝の午後+夜間 合計4,000円以内
# 料金・定員はすべて市公式ページ/PDFで個別確認済み（2026-07-16調査）
# fee = 土日祝料金（平日×1.2）の 午後＋夜間 合計
#
# 【4,000円超のため対象外と確定した部屋】
#   教育文化会館: 第1・2会議室, 第1-3・5・6学習室 (4,836円)
#   幸市民館: 第1会議室(7,380円), 第2-4会議室(4,836円), 和室・実習室・音楽室・料理室(5,904円〜)
#   中原市民館: 第1-5会議室(4,836円), 第6会議室・和室・実習室(5,904円), 視聴覚・音楽・料理室(7,380円)
#   日吉分館: 第3学習室(4,836円) / 各館の学習室合併(5,616円〜)
#   東海道かわさき宿交流館: 2時間3,200円の時間貸し制のため対象外
# 【料金の公式確認が取れず保留中の施設（電話確認できれば追加可能）】
#   エポックなかはら 第1-3会議室(中原区・ふれあいネット対応確認済み・044-722-0185)
#   川崎市平和館 第1-3会議室・研修室(中原区・ふれあいネット対応確認済み・044-433-0171)
#   幸スポーツセンター(幸区)
targets:
  - ward: 川崎区
    kan: 教育文化会館
    rooms:
      - {name: 第３会議室, fee: 3492}
      - {name: 第４学習室, fee: 3492}
  - ward: 川崎区
    kan: プラザ大師
    rooms:
      - {name: 第１学習室, fee: 2808, capacity: 36}
      - {name: 第２学習室, fee: 2808, capacity: 30}
      - {name: 実習室, fee: 2808, capacity: 24}
      - {name: 和室, fee: 2280, capacity: 12}
  - ward: 川崎区
    kan: プラザ田島
    rooms:
      - {name: 第１学習室, fee: 2808, capacity: 36}
      - {name: 第２学習室, fee: 2808, capacity: 39}
      - {name: 実習室, fee: 2808, capacity: 30}
      - {name: 和室, fee: 2280, capacity: 16}
  - ward: 幸区
    kan: 日吉分館
    rooms:
      - {name: 第１学習室, fee: 2808, capacity: 24}
      - {name: 第２学習室, fee: 2808, capacity: 27}
      - {name: 第４学習室, fee: 2808, capacity: 27}
      - {name: 実習室, fee: 2808, capacity: 24}
      - {name: 和室, fee: 2280, capacity: 12}

  - ward: 中原区
    kan: 総合福祉センター
    rooms:  # エポックなかはら。料金・定員は公式料金表(2023年4月版・写真)で確認済み
      - {name: 和室, fee: 3170, capacity: 15}
      - {name: 第１会議室, fee: 1700, capacity: 10}   # 単独10名。第2と連結利用で20名になる前提
      - {name: 第２会議室, fee: 1700, capacity: 10}   # 同上（両方空きの通知が揃った時が連結チャンス）

  - ward: 川崎区
    kan: 老人福祉
    rooms:  # かわさき老人福祉・地域交流センター。市公式料金PDFで確認済み・土日割増なし
            # 月〜土(祝日除く)は17時以降のみ利用可のため、午後+夜間の成立は日曜・祝日のみ
      - {name: 多目的室, fee: 1930, capacity: 24}
  - ward: 川崎区
    kan: 川崎マリエン
    rooms:  # 公式料金表で確認済み。料金は「会議・研修目的の半額」適用時(土日祝2割増込み)
      - {name: 第２会議室, fee: 1464, capacity: 14}
      - {name: 第３会議室, fee: 1464, capacity: 14}
      - {name: 和室, fee: 2196, capacity: 20}
      - {name: 第１研修室, fee: 3048, capacity: 45}
  - ward: 幸区
    kan: 産業振興会館
    rooms:  # 公式料金表で確認済み。土日祝の割増なし(営利目的のみ2倍)
      - {name: 第１研修室, fee: 3040, capacity: 24}
      - {name: 第２会議室, fee: 3460, capacity: 22}
      - {name: 第３会議室, fee: 3460, capacity: 22}
      - {name: 和室, fee: 3860, capacity: 18}
  - ward: 中原区
    kan: 平和館
    rooms:  # 市公式ページで確認済み(土日祝欄)。夜間は18:00-21:30
      - {name: 第１会議室, fee: 3040, capacity: 16}
      - {name: 第２会議室, fee: 3770, capacity: 24}
      - {name: 研修室, fee: 1700, capacity: 12}
  - ward: 中原区
    kan: 国際交流センター
    rooms:  # 指定管理者公式料金表で確認済み(平日額×1.2・10円未満切捨て)
      - {name: 第６会議室, fee: 1080, capacity: 18}
      - {name: 交流サロン, fee: 2430, capacity: 30}

notify_filled: true

# 何日先まで確認するか（市民館系は4か月前から空き確認可能。日数を増やすと実行時間が伸びます）
horizon_days: 70
