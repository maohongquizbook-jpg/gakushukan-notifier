# Discord Webhook URL（GitHub Actionsで使う場合はここは空のままにし、Secretsに登録する）
discord_webhook_url: ""

# 「どこで」の選択値。1000_1650 = 生涯学習館（5館全部が1回の検索で取得される）
category_value: "1000_1650"

# 特定の館だけに絞りたい場合に館名を列挙（空なら全館対象）
# 例: facility_filter: [西戸山, 戸山]
facility_filter: []

# 通知条件: 同じ部屋・同じ日にここで指定した時間帯が「全部」空いていること
required_slots:
  - 午後
  - 夜間

# --loop（常駐モード）でのチェック間隔（分）
check_interval_min: 5

# 常駐モードの稼働時間帯 [開始時, 終了時)
active_hours: [7, 23]
