# Discord の「チャンネル編集 → 連携サービス → ウェブフック」で発行したURLを貼る
discord_webhook_url: ""

# 監視対象の生涯学習館（不要な館は行ごと削除してOK）
facilities:
  - 赤城生涯学習館
  - 北新宿生涯学習館
  - 住吉町生涯学習館
  - 戸山生涯学習館
  - 西戸山生涯学習館

# 通知条件: 同じ部屋・同じ日にここで指定した時間帯が「全部」空いていること
required_slots:
  - 午後
  - 夜間

# 検索期間（システムの検索条件「いつ」に対応: 今日 / 明日 / 1週間 / 1か月）
period: 1か月

# --loop（常駐モード）でのチェック間隔（分）。5分未満は推奨しません
check_interval_min: 5

# 常駐モードの稼働時間帯 [開始時, 終了時)。深夜のアクセスを避ける
active_hours: [7, 23]

# 施設ごとの取得間隔（秒）
per_facility_wait_sec: 3
